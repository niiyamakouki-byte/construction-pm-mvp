name: security-scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 19 * * *" # 04:00 JST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: security gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest detect \
            --source /repo \
            --config /repo/.gitleaks.toml \
            --no-git \
            --no-banner \
            --redact \
            --exit-code 1

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        # npmレジストリがpnpm auditの使う旧audit APIを廃止(HTTP 410)したため、
        # 新bulk advisoryエンドポイント対応済みのnpm CLIでauditを代替する。
        # https://github.com/pnpm/pnpm/issues/11265
        # pnpmが作ったnode_modules(シンボリックリンク構造)と同居させると
        # npm arboristがクラッシュするため、隔離ディレクトリで実行する。
        run: |
          audit_dir="$(mktemp -d)"
          cp package.json "$audit_dir/"
          (cd "$audit_dir" && npm install --package-lock-only --ignore-scripts && npm audit --audit-level=high)

      - name: Semgrep high-confidence scan
        run: |
          python3 -m pip install --upgrade semgrep
          semgrep scan --config p/owasp-top-ten --config p/secrets --severity ERROR --error
