name: security-scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 19 * * *" # 04:00 JST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: security gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest detect \
            --source /repo \
            --no-banner \
            --redact \
            --exit-code 1

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level high

      - name: Semgrep high-confidence scan
        run: |
          python3 -m pip install --upgrade semgrep
          semgrep scan --config p/owasp-top-ten --config p/secrets --severity ERROR --error
